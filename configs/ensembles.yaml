train:
  run_name: ensembles0
  experiment_name: RF_basic
  version: '1.0'
  output_dir: output/ensembles/
  checkpoint_dir: trained_models/ensembles/

data:
    root_dir: data/goldilocks
    id_prop_csv: id_prop.csv
    qe_input_files: null #qe_input_files
    random_seed: 11
    train_ratio: 0.8
    val_ratio: 0.1
    test_ratio: 0.1
    save_features: true

model:
    name: RF # RF, GB, HGB
    random_seed: 42
    n_estimators: 100
    learning_rate: 0.2
    classification: false
    quantile_regression: false
    quantile: 0.9

features:
    composition_features:
        ElementProperty: true
        Stoichiometry: true
        ValenceOrbital: true
        IonProperty: false
        AtomicOrbitals: false
    structure_features:
        GlobalSymmetryFeatures: true
        DensityFeatures: true
    jarvis_features: false
    soap_features: true
    soap_params: 
        r_cut: 10.0
        n_max: 8
        l_max: 6
        sigma: 1.0
    lattice_features: true
    cgcnn_features: true
    checkpoint_path: utils/trained_is_metal_cgcnn/is_metal.ckpt
    matscibert_features: false
    lmdb_exist: false
    feature_file: null #features.npy #null

    